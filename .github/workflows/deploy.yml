name: 建置並部署（自動更新 MLB）

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *" # 每小時：自動抓最新 MLB 賽事並重新上線
  workflow_dispatch: {} # 也可手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run fetch # 抓最新 MLB → public/data.json
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
